url: 'https://futurepastmedia.ca'
baseurl: ''
permalink: pretty
title: 'Future Past Media'

logo:
  mobile: "images/logo/logo.png"
  mobile_height: "40px"
  mobile_width: "118px"
  desktop: "images/logo/logo.png"
  desktop_height: "56px"
  desktop_width: "165px"

home:
  limit_services: 4

collections:
  services:
    output: true
    sort_by: weight

defaults:
  - scope:
      path: ""
      type: "services"
    values:
      layout: "service"

sass:
  style: compressed # possible values: nested expanded compact compressed

plugins:
  - jekyll-environment-variables

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - LICENSE
  - README.md
